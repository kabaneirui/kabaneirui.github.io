    <h3 id="匈牙利标记法"><a href="#匈牙利标记法" class="headerlink" title="匈牙利标记法"></a>匈牙利标记法</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line">前缀		       数据类型</span><br><span class="line">c		       char或WCHAR或TCHAR</span><br><span class="line">by		     BYTE</span><br><span class="line">n		       short</span><br><span class="line">i		       int</span><br><span class="line">x,y		     int，表示x坐标和y坐标</span><br><span class="line">cx,cy		   int，表示x或y的长度，c表示count</span><br><span class="line">B或f		    BOOL（int），f表示flag</span><br><span class="line">w		       WORD(无符号短整形)</span><br><span class="line">l		       LONG(长整形)</span><br><span class="line">dw		     DWORD(无符号长整形)</span><br><span class="line">fn		     函数</span><br><span class="line">s		       字符串</span><br><span class="line">sz		     以零结束的字符串</span><br><span class="line">h	         句柄</span><br><span class="line">p		       指针</span><br></pre></td></tr></table></figure>
<h3 id="常用头文件"><a href="#常用头文件" class="headerlink" title="常用头文件"></a>常用头文件</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">WINDEF.H	  基本数据类型定义</span><br><span class="line">WINNT.H		  支持unicode的类型定义</span><br><span class="line">WINBASE.H	  内核函数</span><br><span class="line">WINUSER.H	  用户界面函数</span><br><span class="line">WINGDI.H 	  图形设备接口函数</span><br></pre></td></tr></table></figure>
<h3 id="句柄"><a href="#句柄" class="headerlink" title="句柄"></a>句柄</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">HINSTANCE 	实例句柄（程序本身）</span><br><span class="line">HWND	     	窗口句柄</span><br><span class="line">HDC		      设备环境句柄</span><br></pre></td></tr></table></figure>
<h3 id="结构体"><a href="#结构体" class="headerlink" title="结构体"></a>结构体</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">MSG		       消息结构</span><br><span class="line">WNDCLASS	   窗口类结构</span><br><span class="line">PAINTSTRUCT	 绘制结构</span><br><span class="line">RECT		     矩形结构</span><br></pre></td></tr></table></figure>
<h3 id="常用的常量前缀"><a href="#常用的常量前缀" class="headerlink" title="常用的常量前缀"></a>常用的常量前缀</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">前缀		        常量</span><br><span class="line">CS		        类风格选项</span><br><span class="line">CW		        创建窗口选项</span><br><span class="line">DT		        文本绘制选项</span><br><span class="line">IDI		        图标的ID号</span><br><span class="line">IDC		        光标的ID号</span><br><span class="line">MB		        消息框选项</span><br><span class="line">SND		        声音选项</span><br><span class="line">WM		        窗口消息</span><br><span class="line">WS		        窗口风格</span><br></pre></td></tr></table></figure>
<h4 id="LPSTR与PSTR的区别："><a href="#LPSTR与PSTR的区别：" class="headerlink" title="LPSTR与PSTR的区别："></a>LPSTR与PSTR的区别：</h4><p>这两种数据类型WINNT.H中都声明为指向字符串的指针。前缀LP代表长指针，是16位windows的产物。</p>
